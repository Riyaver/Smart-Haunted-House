<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SHH Command Centre</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0b0f; color: #fff; padding: 30px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 25px; }
        
        /* Master Timer Console styling */
        .timer-console { background: linear-gradient(145deg, #14141f, #1a1a26); padding: 30px; border-radius: 12px; border: 1px solid #ff0055; text-align: center; margin-bottom: 25px; box-shadow: 0 0 20px rgba(255, 0, 85, 0.1); }
        .clock-display { font-family: 'Courier New', monospace; font-size: 64px; font-weight: bold; color: #ff0055; text-shadow: 0 0 15px rgba(255, 0, 85, 0.6); margin: 15px 0; }
        
        .card { background: #13131a; padding: 20px; border-radius: 8px; border-left: 5px solid #444; transition: all 0.3s ease; }
        .value { font-size: 36px; font-weight: bold; color: #ff3333; margin: 10px 0; }
        .target { border-left-color: #ff0000; background: #221114; box-shadow: 0 0 15px rgba(255, 0, 0, 0.2); }
        .status-badge { display: inline-block; padding: 4px 8px; font-size: 12px; border-radius: 4px; background: #222; color: #888; }
        .target .status-badge { background: #ff0000; color: #fff; }

        /* Controls styling */
        .control-panel { display: flex; justify-content: center; align-items: center; gap: 15px; margin-top: 15px; flex-wrap: wrap; }
        input[type="number"] { background: #1e1e2d; border: 1px solid #333; color: #fff; padding: 12px; font-size: 18px; border-radius: 6px; width: 100px; text-align: center; }
        button { padding: 12px 24px; font-size: 16px; font-weight: bold; border-radius: 6px; border: none; cursor: pointer; transition: background 0.2s; }
        .btn-start { background: #00ff66; color: #0b0b0f; }
        .btn-start:hover { background: #00cc52; }
        .btn-stop { background: #ff3333; color: #fff; }
        .btn-stop:hover { background: #cc0000; }
    </style>
</head>
<body>

    <div class="timer-console">
        <h2 style="margin: 0; text-transform: uppercase; letter-spacing: 2px; color: #888; font-size: 16px;">Controller</h2>
        <div id="main-clock" class="clock-display">00:00</div>
        
        <div class="control-panel">
            <input type="number" id="duration-input" value="60" min="0">
            <button class="btn-start" onclick="triggerAction('start')">Start Timer</button>
            <button class="btn-stop" onclick="triggerAction('stop')">Stop Timer</button>
        </div>
    </div>

    <div class="grid">
        <div id="card-player1" class="card">
            <h2>Player 1</h2>
            <div id="bpm-player1" class="value">60 <span style="font-size: 16px;">BPM</span></div>
            <div id="badge-player1" class="status-badge">Safe</div>
        </div>
        <div id="card-player2" class="card">
            <h2>Player 2</h2>
            <div id="bpm-player2" class="value">60 <span style="font-size: 16px;">BPM</span></div>
            <div id="badge-player2" class="status-badge">Safe</div>
        </div>
        <div id="card-player3" class="card">
            <h2>Player 3</h2>
            <div id="bpm-player3" class="value">60 <span style="font-size: 16px;">BPM</span></div>
            <div id="badge-player3" class="status-badge">Safe</div>
        </div>
    </div>

    <script>
        const socket = io();

        function triggerAction(action) {
            const duration = document.getElementById('duration-input').value;
            socket.emit('timer-control', { action: action, value: parseInt(duration) });
        }

        function formatTime(totalSeconds) {
            const mins = Math.floor(totalSeconds / 60);
            const secs = totalSeconds % 60;
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        socket.on('haunted-house-data', (packet) => {
            const topic = packet.topic;
            const message = packet.message;

            if (topic === 'room/control/timer_sync') {
                const currentSeconds = parseInt(message);
                document.getElementById('main-clock').innerText = formatTime(currentSeconds);
                if (currentSeconds > 0) {
                    document.getElementById('duration-input').value = currentSeconds;
                }
            }

            const parts = topic.split('/');
            if (parts[2] === 'heartbeat') {
                document.getElementById(`bpm-${parts[1]}`).innerHTML = `${message} <span style="font-size: 16px;">BPM</span>`;
            }

            if (parts[2] === 'notifications') {
                const card = document.getElementById(`card-${parts[1]}`);
                const badge = document.getElementById(`badge-${parts[1]}`);
                if (card && badge) {
                    if (message === 'BOO!!') {
                        card.classList.add('target');
                        badge.innerText = 'Target';
                    } else {
                        card.classList.remove('target');
                        badge.innerText = 'Safe';
                    }
                }
            }
        });
    </script>
</body>
</html>
